services:
  app:
    build:
      context: ./src
      dockerfile: Dockerfile
    image: igsign:local
    command: sh -c "cd /app && bundle exec rails db:migrate && exec bundle exec puma -C /app/config/puma.rb --dir /app"
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "127.0.0.1:8004:3000"
    volumes:
      - app_data:/data/docuseal
      - ./src/app:/app/app
      - ./src/config:/app/config
      - ./src/lib:/app/lib
      - ./src/db/seeds:/app/db/seeds
      - ./src/db/migrate:/app/db/migrate
    env_file:
      - .env
    environment:
      RAILS_ENV: production
      DATABASE_URL: "postgres://igsign:${POSTGRES_PASSWORD}@db:5432/igsign"
      WORKDIR: /data/docuseal
      RAILS_SERVE_STATIC_FILES: "true"
      RAILS_LOG_TO_STDOUT: "true"
      FORCE_SSL: "false"
      PORT: "3000"

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: igsign
      POSTGRES_USER: igsign
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

volumes:
  app_data:
  postgres_data:
