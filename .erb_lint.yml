---
# ERBlint configuration for IGSIGN
# RuboCop integration is intentionally disabled — the standalone RuboCop job
# already lints all .rb code. Running it again through ERBlint on the Ruby
# inside ERB files produces hundreds of duplicate/false-positive offenses in
# inline styles, data-tip attributes, and CAF PDF template Ruby expressions.
#
# Re-enable individual cops here if specific ERB-only issues need enforcement.
EnableDefaultLinters: false
linters:
  ErbSafety:
    enabled: false
  HardCodedString:
    enabled: false
  Rubocop:
    enabled: false
