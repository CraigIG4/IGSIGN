name: IGSIGN Keep-Alive

on:
  schedule:
    # Every 25 minutes — keeps Codespace under the 30-min idle threshold
    - cron: '*/25 * * * *'
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      GH_TOKEN: ${{ secrets.IGSIGN_CS_TOKEN }}
      CODESPACE: expert-eureka-xrwx547g5444c977j

    steps:
      - name: Wake IGSIGN Codespace
        run: |
          # Check current state
          STATE=$(gh api /user/codespaces/$CODESPACE --jq '.state' 2>&1)
          echo "Current state: $STATE"

          # Start if not running
          if [ "$STATE" != "Available" ]; then
            echo "Starting Codespace..."
            gh api --method POST /user/codespaces/$CODESPACE/start 2>&1 || true
            sleep 10
            NEW_STATE=$(gh api /user/codespaces/$CODESPACE --jq '.state' 2>&1)
            echo "New state: $NEW_STATE"
          else
            echo "Codespace already running — keep-alive ping sent"
          fi

          echo "Done at $(date -u)"
